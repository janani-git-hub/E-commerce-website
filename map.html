<!DOCTYPE html>
<html>
<head>
<title>Store Location</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#fff;
}

/* top bar */
.topbar{
    background:linear-gradient(45deg,#ff4d6d,#ff85a2);
    color:white;
    padding:18px 30px;
    font-size:22px;
    font-weight:600;
}

/* map container */
.map-wrapper{
    position:relative;
}

iframe{
    width:100%;
    height:88vh;
    border:0;
}

/* floating buttons */
.controls{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    gap:15px;
}

.control-btn{
    background:white;
    padding:12px 18px;
    border-radius:30px;
    text-decoration:none;
    color:#c2185b;
    font-weight:600;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="topbar" id="title">Store Location</div>

<div class="map-wrapper">

    <div class="controls">
    <a class="control-btn" href="locations.html">⬅ Back</a>
    <a class="control-btn" id="directionBtn" target="_blank">Get Directions</a>
    <a class="control-btn" id="openMapBtn" target="_blank">Open in Google Maps</a>
</div>
    <iframe id="mapFrame"></iframe>

</div>

<script>
// Read values from URL
const params = new URLSearchParams(window.location.search);
const place = params.get("place");   // coordinates
const name = params.get("name");     // branch name

// Set page title
document.getElementById("title").innerText = name;

// Load exact map using coordinates
document.getElementById("mapFrame").src =
    "https://maps.google.com/maps?q=" + place + "&z=17&output=embed";

// Directions button
document.getElementById("directionBtn").href =
    "https://www.google.com/maps/dir/?api=1&destination=" + place;

    document.getElementById("openMapBtn").href =
    "https://www.google.com/maps/search/?api=1&query=" + place;
</script>

</body>
</html>
